services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dbt-analytics-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in .env}"
    ports:
      - "${DBT_SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./dataset:/data:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  sql_data:
