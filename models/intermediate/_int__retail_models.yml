version: 2

####################################################################################
####################### Model: int_customer_profile ###############################
####################################################################################
models:
  - name: int_customer_profile
    description: |
      Cleans and standardizes core customer profile information for downstream
      analytical models. This model normalizes customer titles, extracts first
      and last names from the full name, standardizes gender values, and converts
      multiple date formats into a consistent DATE data type for reliable
      reporting and analytics.

    columns:
      - name: title
        description: |
          Standardized customer title with leading and trailing whitespace
          removed.

      - name: first_name
        description: |
          Customer's first name extracted from the full_name field. Supports
          names containing two or three words.
        tests:
          - not_null

      - name: last_name
        description: |
          Customer's last name extracted from the full_name field.
        tests:
          - not_null

      - name: gender
        description: |
          Standardized customer gender. Common abbreviations and alternative
          values are normalized to 'Male', 'Female', 'Non-Binary', 'Other',
          or 'Unknown'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Male', 'Female', 'Non-Binary', 'Other', 'Unknown']

      - name: date_of_birth
        description: |
          Customer date of birth converted into a standard DATE data type.
          Supports multiple input formats including ISO, US, European, and
          month-name formats. Invalid or unrecognized values are returned
          as NULL.
        tests:
          - not_null
          
####################################################################################
####################### Model: int_customers_contact ###############################
####################################################################################
  - name: int_customers_contact
    description: |
      Cleans and standardizes customer contact information for downstream
      analytical models. This model validates and normalizes email addresses,
      formats phone numbers into a consistent structure, and standardizes
      preferred communication channels to improve data quality and reporting.

    columns:
      - name: email
        description: |
          Standardized customer email address. Invalid or missing email
          addresses are replaced with 'Unknown'. Common domain spelling
          mistakes are automatically corrected.
        tests:
          - not_null

      - name: phone
        description: |
          Standardized customer phone number formatted as
          +1 (XXX) XXX-XXXX. Invalid or missing phone numbers are
          replaced with 'Unknown'.
        tests:
          - not_null

      - name: preferred_channel
        description: |
          Standardized customer preferred communication channel.
          Source values are normalized into business-friendly categories.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  ['Mobile App', 'In Store', 'Catalog', 'Website', 'Phone Call', 'Unknown']



####################################################################################
####################### Model: int_customer_location ###############################
####################################################################################
  - name: int_customer_location
    description: |
      Cleans and standardizes customer geographic information for downstream
      analytical models. This model resolves common data quality issues such as
      missing values, inconsistent capitalization, typographical errors in city
      names, invalid state abbreviations, malformed ZIP codes, and inconsistent
      country values. It provides a reliable and consistent customer location
      dimension for business reporting and analytics.

    columns:
      - name: address
        description: |
          Standardized customer street address. Missing or blank values are
          replaced with 'Unknown', while valid addresses are converted to
          Title Case and trimmed of leading and trailing whitespace.
        tests:
          - not_null

      - name: city
        description: |
          Standardized customer city name. Common spelling mistakes are corrected,
          text is converted to Title Case, and missing or blank values are
          replaced with 'Unknown'.
        tests:
          - not_null

      - name: state_abbr
        description: |
          Two-letter uppercase state abbreviation. Invalid, blank, null, or
          incorrectly formatted values are replaced with 'Unknown'.
        tests:
          - not_null

      - name: state
        description: |
          Full state name for the customer's location. Leading and trailing
          whitespace is removed, and missing or blank values are replaced
          with 'Unknown'.
        tests:
          - not_null

      - name: zip_code
        description: |
          Five-digit ZIP code. Invalid, non-numeric, null, or incorrectly
          formatted ZIP codes are replaced with 0.
        tests:
          - not_null

      - name: country
        description: |
          Standardized country name. Multiple representations of the United
          States (USA, US, U.S.A., United States) are normalized to
          'United States'. All other values are categorized as 'Unknown'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['United States', 'Unknown']

      - name: region
        description: |
          Customer geographic region. Missing or blank values are replaced
          with 'Unknown'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Midwest', 'Northeast', 'South', 'West']